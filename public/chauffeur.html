<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MK TAXI — السائق</title>
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.hdr{background:#f6c90e;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-brand{font-size:16px;font-weight:600;color:#0d1117}
.hdr-name{font-size:12px;color:rgba(0,0,0,.6);background:rgba(0,0,0,.1);padding:3px 10px;border-radius:20px}
.container{padding:14px;max-width:480px;margin:0 auto}
.card{background:#1a1f2e;border-radius:16px;padding:16px;margin-bottom:12px}
/* Toggle */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between}
.toggle-info .t-label{font-size:16px;font-weight:500}
.toggle-info .t-sub{font-size:12px;color:#718096;margin-top:3px}
.toggle-sw{width:54px;height:30px;border-radius:15px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;border:none;outline:none;padding:0}
.toggle-knob{width:26px;height:26px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .15s ease;pointer-events:none}
.toggle-sw.on{background:#48bb78}
.toggle-sw.on .toggle-knob{transform:translateX(24px)}
.toggle-sw.busy{background:#d69e2e}
.toggle-sw.busy .toggle-knob{transform:translateX(24px)}
.toggle-sw.off{background:#e53e3e}
/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:#1a1f2e;border-radius:14px;padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:600}
.stat-lbl{font-size:11px;color:#718096;margin-top:4px}
/* Nearby */
.nearby-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.nearby-title{font-size:13px;font-weight:500;color:#a0aec0}
.nearby-badge{background:#f6c90e;color:#0d1117;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.nearby-empty{text-align:center;color:#4a5568;font-size:12px;padding:8px 0}
.nearby-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,.07)}
.nearby-row:last-child{border-bottom:none}
.nearby-name{font-size:13px;color:#e2e8f0;font-weight:500}
.nearby-meta{font-size:11px;color:#718096;margin-top:2px}
.nearby-dist{font-size:14px;font-weight:600;color:#f6c90e}
/* GPS */
.gps-bar{background:#111827;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.gps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gps-dot.active{background:#48bb78;animation:pulse 2s infinite}
.gps-dot.inactive{background:#e53e3e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.gps-text{font-size:12px;color:#718096}
/* WA button */
.wa-btn{background:#25d366;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;margin-bottom:10px}
.finish-btn{background:#1a3a2a;border:2px solid #48bb78;border-radius:14px;padding:14px;font-size:14px;font-weight:600;color:#68d391;cursor:pointer;width:100%;display:none}
.logout-btn{background:transparent;border:none;color:#4a5568;font-size:12px;cursor:pointer;width:100%;padding:8px;margin-top:4px}
/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d1117;padding:20px}
.login-card{background:#1a1f2e;border-radius:20px;padding:28px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:600;color:#f6c90e;margin-bottom:6px}
.login-sub{font-size:13px;color:#718096;margin-bottom:24px}
.login-card input{width:100%;background:#0d1117;border:1px solid #2d3748;border-radius:12px;padding:13px 16px;font-size:15px;color:#e2e8f0;outline:none;margin-bottom:12px;direction:ltr;text-align:center}
.login-card input:focus{border-color:#f6c90e}
.login-card button{width:100%;background:#f6c90e;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;color:#0d1117;cursor:pointer}
.error-msg{color:#fc8181;font-size:13px;margin-top:8px;min-height:20px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <div class="login-logo">🚕</div>
    <div class="login-title">MK TAXI</div>
    <div class="login-sub">لوحة السائق | Espace Chauffeur</div>
    <input type="tel" id="phone-input" placeholder="222XXXXXXXX" maxlength="12" inputmode="numeric">
    <button onclick="doLogin()">→ Connexion | دخول</button>
    <div class="error-msg" id="err-msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="hdr">
    <div class="hdr-brand">🚕 MK TAXI</div>
    <div class="hdr-name" id="drv-name">—</div>
  </div>

  <div class="container">
    <!-- Toggle -->
    <div class="card">
      <div class="toggle-wrap">
        <div class="toggle-info">
          <div class="t-label" id="t-label">متاح | Disponible</div>
          <div class="t-sub" id="t-sub">GPS actif — En attente</div>
        </div>
        <button class="toggle-sw off" id="toggle-sw" onclick="handleToggle()">
          <div class="toggle-knob"></div>
        </button>
      </div>
    </div>

    <!-- GPS bar -->
    <div class="gps-bar">
      <div class="gps-dot inactive" id="gps-dot"></div>
      <div class="gps-text" id="gps-text">GPS غير نشط | inactif — toutes les 15s</div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-status">🔴</div>
        <div class="stat-lbl">الحالة | Statut</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-rides">0</div>
        <div class="stat-lbl">رحلات اليوم | Courses</div>
      </div>
    </div>

    <!-- Clients proches -->
    <div class="card">
      <div class="nearby-hdr">
        <div class="nearby-title">🔍 Clients dans votre zone</div>
        <div class="nearby-badge" id="nearby-count">0</div>
      </div>
      <div id="nearby-list"><div class="nearby-empty">Aucun client à proximité</div></div>
    </div>

    <!-- WhatsApp -->
    <a id="wa-link" class="wa-btn" href="#" target="_blank">
      <span>💬</span> Ouvrir WhatsApp | فتح واتساب
    </a>

    <!-- Terminer course -->
    <button class="finish-btn" id="finish-btn" onclick="finishRide()">
      ✅ Terminer la course | إنهاء الرحلة
    </button>

    <button class="logout-btn" onclick="doLogout()">← Déconnexion | سجيل خروج</button>
  </div>
</div>

<script>
const BASE = 'https://mlk-transport-production.up.railway.app';
let driverPhone = null;
let driverToken = null;
let isOnline    = false;
let pingInterval= null;
let gpsWatchId  = null;
let gpsInterval = null;
let bgInterval  = null;
let wakeLock    = null;

// ─── INIT ──────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const urlToken = new URLSearchParams(location.search).get('t');
  const savedToken = localStorage.getItem('mkd_token');
  const activeToken = urlToken || savedToken;

  if (activeToken) {
    // Sauvegarder token immédiatement
    if (urlToken) localStorage.setItem('mkd_token', urlToken);
    driverToken = activeToken;

    // Essayer de charger avec retry automatique
    await loadWithRetry(activeToken);
    return;
  }
  document.getElementById('login-page').style.display = 'flex';
});

async function loadWithRetry(token, attempt=1) {
  try {
    const r = await fetch(`${BASE}/api/driver-by-token/${token}`, { signal: AbortSignal.timeout(8000) });
    if (r.ok) {
      const data = await r.json();
      if (!data.driver.validated) {
        document.getElementById('login-page').style.display = 'flex';
        document.getElementById('err-msg').textContent = 'Dossier en attente de validation admin.';
        return;
      }
      driverPhone = data.driver.phone;
      driverToken = token;
      localStorage.setItem('mkd_token', token);
      showDashboard(data);
      return;
    }
    // Token invalide → montrer login
    localStorage.removeItem('mkd_token');
    document.getElementById('login-page').style.display = 'flex';
  } catch(e) {
    // Serveur down → retry jusqu'à 5 fois
    if (attempt <= 5) {
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('err-msg').textContent = `Reconnexion... (${attempt}/5)`;
      await new Promise(r => setTimeout(r, 2000 * attempt));
      await loadWithRetry(token, attempt + 1);
    } else {
      document.getElementById('err-msg').textContent = 'Serveur indisponible. Réessayez.';
    }
  }
}

async function doLogin() {
  const phone = document.getElementById('phone-input').value.replace(/\D/g,'');
  if (phone.length < 8) { document.getElementById('err-msg').textContent = 'Numéro invalide'; return; }
  try {
    const r = await fetch(`${BASE}/api/token/driver/${phone}`);
    if (!r.ok) throw new Error('Non trouvé');
    const { token } = await r.json();
    const r2 = await fetch(`${BASE}/api/driver-by-token/${token}`);
    if (!r2.ok) throw new Error('Chauffeur non enregistré');
    const data = await r2.json();
    if (!data.driver.validated) {
      document.getElementById('err-msg').textContent = 'Dossier en attente de validation.';
      return;
    }
    driverPhone = data.driver.phone;
    driverToken = token;
    localStorage.setItem('mkd_token', token);
    showDashboard(data);
  } catch(e) {
    document.getElementById('err-msg').textContent = e.message || 'Erreur connexion';
  }
}

function showDashboard(data) {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('drv-name').textContent = data.driver.name;
  document.getElementById('wa-link').href = `https://wa.me/${driverPhone}`;
  
  const wasOnline = data.driver.status === 'online' || data.driver.status === 'busy';
  isOnline = wasOnline;
  updateUI(data.hasActiveRide, data.today);
  startPing();
  
  // Si le chauffeur était en ligne → démarrer GPS automatiquement
  if (wasOnline && gpsWatchId === null) {
    requestWakeLock();
    startGPS();
  }
}

// ─── UI ─────────────────────────────────────────────────────
function updateUI(hasRide, today) {
  const sw    = document.getElementById('toggle-sw');
  const label = document.getElementById('t-label');
  const sub   = document.getElementById('t-sub');
  const stat  = document.getElementById('stat-status');
  const rides = document.getElementById('stat-rides');
  const fin   = document.getElementById('finish-btn');
  if (today !== undefined) rides.textContent = today;
  if (hasRide) {
    sw.className = 'toggle-sw busy';
    label.textContent = 'رحلة جارية | En course';
    sub.textContent   = 'Tapez *1* sur WhatsApp pour terminer';
    stat.textContent  = '🟡';
    fin.style.display = 'block';
  } else if (isOnline) {
    sw.className = 'toggle-sw on';
    label.textContent = 'متاح | Disponible';
    sub.textContent   = 'GPS actif — En attente de courses';
    stat.textContent  = '🟢';
    fin.style.display = 'none';
  } else {
    sw.className = 'toggle-sw off';
    label.textContent = 'غير متاح | Hors ligne';
    sub.textContent   = 'Appuyez pour vous mettre en ligne';
    stat.textContent  = '🔴';
    fin.style.display = 'none';
  }
}

// ─── TOGGLE ─────────────────────────────────────────────────
async function handleToggle() {
  const sw = document.getElementById('toggle-sw');
  if (sw.classList.contains('busy')) {
    await finishRide(); return;
  }
  if (isOnline) {
    // Passer hors ligne
    stopGPS();
    isOnline = false;
    updateUI(false);
    await fetch(`${BASE}/api/driver/${driverPhone}/offline`, { method:'POST' }).catch(()=>{});
  } else {
    // Passer en ligne → mettre vert immédiatement
    isOnline = true;
    updateUI(false);
    requestWakeLock();
    if (gpsWatchId === null) startGPS();
  }
}

// ─── GPS ─────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) return;
  gpsWatchId = navigator.geolocation.watchPosition(
    async pos => { await sendGPS(pos.coords.latitude, pos.coords.longitude); },
    err => { setTimeout(()=>{ stopGPS(); if(isOnline) startGPS(); }, 10000); },
    { enableHighAccuracy:true, timeout:20000, maximumAge:3000 }
  );
  gpsInterval = setInterval(() => {
    navigator.geolocation.getCurrentPosition(
      p => sendGPS(p.coords.latitude, p.coords.longitude), ()=>{},
      { enableHighAccuracy:true, timeout:10000, maximumAge:10000 }
    );
  }, 15000);
  bgInterval = setInterval(async () => {
    if (!wakeLock||wakeLock.released) await requestWakeLock();
  }, 20000);
  document.getElementById('gps-dot').className = 'gps-dot active';
  document.getElementById('gps-text').textContent = 'GPS نشط | actif — toutes les 15s';
}

function stopGPS() {
  if (gpsWatchId!==null){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId=null; }
  if (gpsInterval){ clearInterval(gpsInterval); gpsInterval=null; }
  if (bgInterval){ clearInterval(bgInterval); bgInterval=null; }
  document.getElementById('gps-dot').className = 'gps-dot inactive';
  document.getElementById('gps-text').textContent = 'GPS غير نشط | inactif';
}

async function sendGPS(lat, lng) {
  if (!driverPhone) return;
  try {
    const r = await fetch(`${BASE}/api/driver/location`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone: driverPhone, lat, lng })
    });
    if (r.ok) {
      // GPS envoyé → confirmer statut online visuellement
      document.getElementById('gps-dot').className = 'gps-dot active';
      document.getElementById('gps-text').textContent = 'GPS نشط | actif — ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
  } catch(e) {
    document.getElementById('gps-dot').className = 'gps-dot inactive';
  }
}

// ─── WAKEKLOCK ───────────────────────────────────────────────
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', ()=>{ if(isOnline) setTimeout(requestWakeLock,1000); });
    }
  } catch(e){}
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState==='visible' && isOnline) {
    await requestWakeLock();
    navigator.geolocation.getCurrentPosition(
      p => sendGPS(p.coords.latitude, p.coords.longitude), ()=>{},
      { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
    loadNearby();
  }
});

// ─── PING ───────────────────────────────────────────────────
function startPing() {
  if (pingInterval) clearInterval(pingInterval);
  loadStatus();
  loadNearby();
  pingInterval = setInterval(async ()=>{
    try { await loadStatus(); } catch(e){}
    if (isOnline) { try { await loadNearby(); } catch(e){} }
  }, 15000);
}

async function loadStatus() {
  if (!driverToken) return;
  try {
    const r = await fetch(`${BASE}/api/driver-by-token/${driverToken}`, 
      { signal: AbortSignal.timeout(5000) });
    if (!r.ok) return; // Serveur down → garder état actuel, ne pas déconnecter
    const d = await r.json();
    // Ne pas mettre offline si le GPS tourne encore (évite écrasement état local)
    const serverOnline = d.driver.status==='online'||d.driver.status==='busy';
    if (serverOnline || gpsWatchId === null) {
      isOnline = serverOnline;
    }
    if (d.driver.name) document.getElementById('drv-name').textContent = d.driver.name;
    updateUI(d.hasActiveRide, d.today);
    document.getElementById('finish-btn').style.display = d.hasActiveRide ? 'block' : 'none';
  } catch(e){
    // Timeout ou erreur réseau → ne rien faire, garder état actuel
    console.warn('[STATUS] Hors ligne temporaire');
  }
}

async function loadNearby() {
  if (!isOnline || !driverPhone) return;
  try {
    const r = await fetch(`${BASE}/api/driver/${driverPhone}/nearby`);
    const d = await r.json();
    const list  = document.getElementById('nearby-list');
    const badge = document.getElementById('nearby-count');
    if (!d.clients?.length) {
      badge.textContent = '0';
      list.innerHTML = '<div class="nearby-empty">Aucun client à proximité</div>';
      return;
    }
    badge.textContent = d.clients.length;
    list.innerHTML = d.clients.map(c=>`
      <div class="nearby-row">
        <div>
          <div class="nearby-name">${c.displayName||'Client'}</div>
          <div class="nearby-meta">${c.elapsed} · ${c.zone||'Cherche un taxi'}</div>
        </div>
        <div class="nearby-dist">${c.distKm} km</div>
      </div>`).join('');
  } catch(e){}
}

async function finishRide() {
  await fetch(`${BASE}/api/driver/${driverPhone}/finish`, { method:'POST' });
  isOnline = true;
  document.getElementById('finish-btn').style.display = 'none';
  updateUI(false);
  setTimeout(loadStatus, 1000);
}

function doLogout() {
  stopGPS();
  if (pingInterval) clearInterval(pingInterval);
  if (wakeLock) wakeLock.release();
  localStorage.removeItem('mkd_token');
  location.href = location.pathname;
}
</script>
</body>
</html>
