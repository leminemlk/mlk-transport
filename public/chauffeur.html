<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>MK TAXI — سائق</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚕</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.header{background:#1a1f2e;border-bottom:2px solid #f6c90e;padding:14px 20px;text-align:center}
.header h1{color:#f6c90e;font-size:20px;font-weight:800}
.header p{color:#718096;font-size:11px;margin-top:2px}
.container{padding:16px;max-width:420px;margin:0 auto}
.login-box{background:#1a1f2e;border:1px solid #2d3748;border-radius:16px;padding:24px;margin-top:32px;text-align:center}
.login-box h2{color:#f6c90e;font-size:18px;margin-bottom:16px}
input[type=tel]{width:100%;background:#0f1117;border:1px solid #2d3748;border-radius:10px;color:#e2e8f0;padding:14px;font-size:18px;margin-bottom:14px;text-align:center;direction:ltr}
input:focus{outline:none;border-color:#f6c90e}
.btn-login{width:100%;background:#f6c90e;color:#1a1a1a;border:none;border-radius:10px;padding:16px;font-size:16px;font-weight:800;cursor:pointer}
.card{background:#1a1f2e;border:1px solid #2d3748;border-radius:14px;padding:16px;margin-bottom:12px}
.driver-name{font-size:18px;font-weight:700;color:#f6c90e}
.driver-phone{color:#718096;font-size:12px;direction:ltr}
.sub-badge{border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12px;text-align:center}
.sub-ok{background:#1a3a2a;color:#68d391;border:1px solid #2d6a4f}
.sub-exp{background:#3a1a1a;color:#fc8181;border:1px solid #6a2d2d}
.toggle-btn{width:100%;border:none;border-radius:14px;padding:20px;font-size:18px;font-weight:800;cursor:pointer;margin-bottom:12px;display:flex;flex-direction:column;align-items:center;gap:4px}
.toggle-btn.offline{background:#2d3748;color:#a0aec0}
.toggle-btn.online{background:linear-gradient(135deg,#2d6a4f,#1b4332);color:#68d391;border:2px solid #48bb78;animation:pulse-g 2s infinite}
@keyframes pulse-g{0%,100%{box-shadow:0 0 15px rgba(72,187,120,.3)}50%{box-shadow:0 0 30px rgba(72,187,120,.6)}}
.toggle-sub{font-size:12px;opacity:.8}
.gps-card{background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.gps-active{color:#68d391;font-size:13px;font-weight:600}
.gps-inactive{color:#718096;font-size:13px}
.gps-coords{font-size:10px;color:#4a5568;font-family:monospace;direction:ltr}
.ride-notif{background:#1a3a2a;border:2px solid #48bb78;border-radius:14px;padding:18px;margin-bottom:12px;animation:slide-in .3s ease}
@keyframes slide-in{from{transform:translateY(-15px);opacity:0}to{transform:translateY(0);opacity:1}}
.ride-title{color:#68d391;font-size:16px;font-weight:800;margin-bottom:10px}
.ride-info{color:#a0aec0;font-size:13px;margin-bottom:4px}
.ride-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn-accept{background:#2d6a4f;color:#68d391;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
.btn-refuse{background:#6a2d2d;color:#fc8181;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
.btn-finish{width:100%;background:#3a2a0a;color:#f6ad55;border:2px solid #f6ad55;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
.ride-timer{text-align:center;color:#4a5568;font-size:11px;margin-top:8px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:#1a1f2e;border:1px solid #2d3748;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:800;color:#f6c90e}
.stat-lbl{font-size:10px;color:#718096;margin-top:2px}
.logout-btn{background:none;border:none;color:#4a5568;font-size:12px;cursor:pointer;display:block;margin:8px auto}
.error-msg{color:#fc8181;font-size:12px;margin-top:8px;text-align:center}
.whatsapp-btn{width:100%;background:#25D366;color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>
<div class="header">
  <h1>🚕 MK TAXI</h1>
  <p>لوحة السائق | Espace Chauffeur</p>
</div>
<div class="container">

  <!-- LOGIN -->
  <div id="login-section">
    <div class="login-box">
      <h2>👤 دخول السائق | Connexion</h2>
      <input type="tel" id="phone-input" placeholder="222XXXXXXXX" maxlength="15" dir="ltr"
        onkeydown="if(event.key==='Enter')login()">
      <button class="btn-login" onclick="login()">دخول | Connexion →</button>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-section" style="display:none">

    <!-- Notification course -->
    <div id="ride-notification" style="display:none" class="ride-notif">
      <div class="ride-title">🚕 رحلة جديدة ! | Nouvelle course !</div>
      <div class="ride-info" id="ride-distance"></div>
      <div class="ride-info" id="ride-eta"></div>
      <div class="ride-btns">
        <button class="btn-accept" onclick="respondRide('accept')">✅ *1* قبول | Accepter</button>
        <button class="btn-refuse" onclick="respondRide('refuse')">❌ *2* رفض | Refuser</button>
      </div>
      <div class="ride-timer" id="ride-timer"></div>
    </div>

    <!-- Bouton fin de course -->
    <button id="finish-btn" class="btn-finish" style="display:none" onclick="finishRide()">
      ✅ *3* إنهاء الرحلة | Terminer la course
    </button>

    <!-- Profil -->
    <div class="card">
      <div class="driver-name" id="driver-name">—</div>
      <div class="driver-phone" id="driver-phone">—</div>
      <div id="sub-badge" class="sub-badge sub-ok">...</div>
    </div>

    <!-- Boutons statut -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <button id="btn-active" onclick="setActive()" style="background:#1a3a2a;color:#68d391;border:2px solid #48bb78;border-radius:12px;padding:14px 8px;font-size:13px;font-weight:700;cursor:pointer">
        🟢<br>متاح<br><small>Actif</small>
      </button>
      <button id="btn-pause" onclick="setPause()" style="background:#2d3748;color:#a0aec0;border:2px solid #4a5568;border-radius:12px;padding:14px 8px;font-size:13px;font-weight:700;cursor:pointer">
        ⏸<br>استراحة<br><small>Pause</small>
      </button>
      <button id="btn-stop" onclick="setStop()" style="background:#3a1a1a;color:#fc8181;border:2px solid #6a2d2d;border-radius:12px;padding:14px 8px;font-size:13px;font-weight:700;cursor:pointer">
        ⛔<br>إيقاف<br><small>Arrêt</small>
      </button>
    </div>

    <!-- GPS -->
    <div class="gps-card">
      <div style="font-size:24px">📡</div>
      <div style="flex:1">
        <div id="gps-status" class="gps-inactive">GPS غير نشط | inactif</div>
        <div class="gps-coords" id="gps-coords">—</div>
        <div style="font-size:10px;color:#4a5568" id="gps-update">كل 30 ثانية | toutes les 30s</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-box">
        <div class="stat-val" id="stat-courses">0</div>
        <div class="stat-lbl">رحلات اليوم | Courses</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-status">⚫</div>
        <div class="stat-lbl">الحالة | Statut</div>
      </div>
    </div>

    <!-- Ouvrir WhatsApp -->
    <button class="whatsapp-btn" onclick="window.open('https://wa.me/', '_blank')">
      💬 فتح واتساب | Ouvrir WhatsApp
    </button>

    <button class="logout-btn" onclick="logout()">⬅ تسجيل خروج | Déconnexion</button>
  </div>
</div>

<script>
let driverPhone = '';
let driverData = null;
let isOnline = false;
let gpsInterval = null;
let pingInterval = null;
let currentRide = null;
let rideTimer = null;
let wakeLock = null;
let lastLat = null, lastLng = null;

window.onload = () => {
  // Lire le numéro depuis l'URL d'abord
  const urlPhone = new URLSearchParams(window.location.search).get('phone');
  if (urlPhone) {
    // Phone dans l'URL → cacher le formulaire immédiatement
    driverPhone = urlPhone.replace(/\D/g, '');
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard-section').style.display = 'block';
    document.getElementById('driver-name').textContent = '⏳ Chargement...';
    login(true);
  } else {
    // Sinon depuis localStorage
    const saved = localStorage.getItem('mk_driver_phone');
    if (saved) { driverPhone = saved; login(true); }
  }
};

async function login(auto = false) {
  const phone = auto ? driverPhone : document.getElementById('phone-input').value.trim().replace(/\D/g,'');
  if (!phone) return;
  try {
    const res = await fetch('/api/drivers');
    const drivers = await res.json();
    const driver = drivers.find(d => d.phone === phone);
    if (!driver) {
      document.getElementById('login-error').textContent =
        '❌ رقم غير موجود | Numéro non trouvé. Envoyez "chauffeur" sur WhatsApp.';
      return;
    }
    if (!driver.validated) {
      document.getElementById('driver-name').textContent = '⏳ طلبك قيد المراجعة';
      document.getElementById('driver-phone').textContent = 'Dossier en attente de validation admin.';
      return;
    }
    driverPhone = driver.phone;
    driverData = driver;
    localStorage.setItem('mk_driver_phone', driverPhone);
    showDashboard();
  } catch(e) {
    document.getElementById('login-error').textContent = '❌ خطأ في الاتصال | Erreur de connexion.';
  }
}

function showDashboard() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('dashboard-section').style.display = 'block';
  updateUI();
  startPing();
}

function updateUI() {
  if (!driverData) return;
  document.getElementById('driver-name').textContent = '👤 ' + driverData.name;
  document.getElementById('driver-phone').textContent = '+' + driverData.phone;
  const now = new Date();
  const hasTrial = driverData.trial_until && new Date(driverData.trial_until) > now;
  const hasSub = driverData.subscription_end && new Date(driverData.subscription_end) > now;
  const badge = document.getElementById('sub-badge');
  if (hasTrial) {
    const d = Math.ceil((new Date(driverData.trial_until)-now)/86400000);
    badge.className = 'sub-badge sub-ok';
    badge.textContent = `🎁 ${d} أيام مجانية | jours gratuits`;
  } else if (hasSub) {
    const d = Math.ceil((new Date(driverData.subscription_end)-now)/86400000);
    badge.className = 'sub-badge sub-ok';
    badge.textContent = `✅ ${d} يوم متبقي | jours restants`;
  } else {
    badge.className = 'sub-badge sub-exp';
    badge.textContent = `⚠️ انتهى الاشتراك | Abonnement expiré`;
  }
  isOnline = driverData.status === 'online' || driverData.status === 'busy';
  updateToggleBtn();
}

function updateToggleBtn() {
  document.getElementById('stat-status').textContent = isOnline ? '🟢' : '⚫';
  if (isOnline) highlightBtn('btn-active');
  else highlightBtn('btn-pause');
}

async function setActive() {
  startGPS();
  highlightBtn('btn-active');
}

async function setPause() {
  stopGPS();
  await fetch(`/api/driver/${driverPhone}/offline`, { method: 'POST' });
  isOnline = false;
  releaseWakeLock();
  document.getElementById('gps-status').className = 'gps-inactive';
  document.getElementById('gps-status').textContent = 'GPS غير نشط | inactif';
  document.getElementById('stat-status').textContent = '⏸';
  highlightBtn('btn-pause');
  await fetch(`/api/driver/${driverPhone}/offline`, { method: 'POST' });
}

async function setStop() {
  stopGPS();
  await fetch(`/api/driver/${driverPhone}/offline`, { method: 'POST' });
  isOnline = false;
  releaseWakeLock();
  document.getElementById('gps-status').className = 'gps-inactive';
  document.getElementById('gps-status').textContent = 'GPS غير نشط | inactif';
  document.getElementById('stat-status').textContent = '⛔';
  highlightBtn('btn-stop');
}

function highlightBtn(activeId) {
  const btns = ['btn-active', 'btn-pause', 'btn-stop'];
  const styles = {
    'btn-active': { bg: '#1a3a2a', color: '#68d391', border: '#48bb78' },
    'btn-pause':  { bg: '#2d3748', color: '#a0aec0', border: '#4a5568' },
    'btn-stop':   { bg: '#3a1a1a', color: '#fc8181', border: '#6a2d2d' },
  };
  btns.forEach(id => {
    const s = styles[id];
    const btn = document.getElementById(id);
    btn.style.background = s.bg;
    btn.style.color = s.color;
    btn.style.borderColor = s.border;
    btn.style.transform = id === activeId ? 'scale(1.05)' : 'scale(1)';
    btn.style.boxShadow = id === activeId ? `0 0 16px ${s.border}88` : 'none';
  });
}

async function toggleStatus() { setActive(); }

let watchId = null;
let bgInterval = null;

function startGPS() {
  if (!navigator.geolocation) { alert('GPS غير متاح | GPS non disponible'); return; }

  // wakeLock immédiat pour garder l'écran actif
  requestWakeLock();

  // watchPosition principal
  watchId = navigator.geolocation.watchPosition(
    async (pos) => {
      await sendGPSUpdate(pos.coords.latitude, pos.coords.longitude);
      if (!isOnline) { isOnline = true; updateToggleBtn(); }
    },
    (err) => {
      console.warn('GPS err:', err.message);
      setTimeout(() => { stopGPS(); startGPS(); }, 10000);
    },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 3000 }
  );

  // Backup toutes les 15s (couvre l'écran éteint sur Android)
  gpsInterval = setInterval(() => {
    navigator.geolocation.getCurrentPosition(
      p => sendGPSUpdate(p.coords.latitude, p.coords.longitude),
      () => {},
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 10000 }
    );
  }, 15000);

  // Reacquérir wakeLock si libéré (ex: appel entrant, autre app)
  bgInterval = setInterval(async () => {
    if (!wakeLock || wakeLock.released) {
      await requestWakeLock();
    }
  }, 20000);
}

function stopGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (gpsInterval)      { clearInterval(gpsInterval); gpsInterval = null; }
  if (bgInterval)       { clearInterval(bgInterval);  bgInterval  = null; }
}

// Calcul distance en mètres
function distanceM(lat1,lng1,lat2,lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

async function sendGPSUpdate(lat, lng) {
  // Ne mettre à jour que si déplacé de plus de 50m
  if (lastLat !== null && distanceM(lastLat, lastLng, lat, lng) < 50) return;
  lastLat = lat; lastLng = lng;
  try {
    await fetch('/api/driver/location', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ phone: driverPhone, lat, lng })
    });
    document.getElementById('gps-status').className = 'gps-active';
    document.getElementById('gps-status').textContent = '✅ GPS نشط | actif';
    document.getElementById('gps-coords').textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    document.getElementById('gps-update').textContent = new Date().toLocaleTimeString('fr-FR');
  } catch(e) {}
}

function startPing() {
  pingInterval = setInterval(async () => {
    try {
      const res = await fetch(`/api/driver/${driverPhone}/status`);
      const data = await res.json();
      if (data.driver) {
        driverData = { ...driverData, ...data.driver };
        document.getElementById('stat-courses').textContent = data.todayRides || 0;
        // Bouton fin de course
        document.getElementById('finish-btn').style.display = data.hasActiveRide ? 'block' : 'none';
      }
      if (data.pendingOffer && !currentRide) showRideOffer(data.pendingOffer);
      else if (!data.pendingOffer && currentRide) hideRideOffer();
    } catch(e) {}
  }, 5000);
}

function showRideOffer(offer) {
  currentRide = offer;
  document.getElementById('ride-notification').style.display = 'block';
  document.getElementById('ride-distance').textContent = `📍 العميل على بعد ${offer.dist} كم | ${offer.dist} km`;
  document.getElementById('ride-eta').textContent = `⏱ وقت الوصول ~${offer.eta} دقيقة | ~${offer.eta} min`;
  if (navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
  // Son de notification
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.25);
    });
  } catch(e) {}
  let sec = 60;
  rideTimer = setInterval(() => {
    sec--;
    document.getElementById('ride-timer').textContent = `ينتهي في ${sec}s`;
    if (sec <= 0) { clearInterval(rideTimer); hideRideOffer(); }
  }, 1000);
}

function hideRideOffer() {
  currentRide = null;
  document.getElementById('ride-notification').style.display = 'none';
  if (rideTimer) { clearInterval(rideTimer); rideTimer = null; }
}

async function respondRide(response) {
  if (!currentRide) return;
  await fetch('/api/driver/respond', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ phone: driverPhone, response })
  });
  hideRideOffer();
}

async function finishRide() {
  await fetch(`/api/driver/${driverPhone}/finish`, { method: 'POST' });
  document.getElementById('finish-btn').style.display = 'none';
}/free`, { method: 'POST' });
  document.getElementById('free-btn').style.display = 'none';
  document.getElementById('finish-btn').style.display = 'none';
  loadStatus();
}

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        // Reacquérir si toujours en ligne
        if (isOnline) setTimeout(requestWakeLock, 1000);
      });
    }
  } catch(e) { console.warn('WakeLock:', e.message); }
}
function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }

// Reacquérir wakeLock + relancer GPS quand page redevient visible
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && isOnline) {
    await requestWakeLock();
    // Forcer une MAJ GPS immédiate
    navigator.geolocation.getCurrentPosition(
      p => sendGPSUpdate(p.coords.latitude, p.coords.longitude),
      () => {},
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }
});

function logout() {
  stopGPS();
  if (pingInterval) clearInterval(pingInterval);
  releaseWakeLock();
  localStorage.removeItem('mk_driver_phone');
  location.reload();
}
</script>
</body>
</html>
