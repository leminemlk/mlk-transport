<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MK TAXI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚕</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#1a1f2e;border-radius:20px;padding:32px 24px;max-width:340px;width:100%;text-align:center;border:1px solid #2d3748}
.logo{font-size:64px;margin-bottom:12px}
h1{color:#f6c90e;font-size:26px;margin-bottom:6px;font-weight:800}
.sub{color:#718096;font-size:13px;margin-bottom:28px}
.btn{width:100%;background:linear-gradient(135deg,#2d6a4f,#1b4332);border:2px solid #48bb78;border-radius:14px;padding:22px;color:#68d391;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;flex-direction:column;outline:none;transition:opacity .2s}
.btn:active{opacity:.8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ar{font-size:15px;color:#b7e4c7;margin-top:2px}
.status{margin-top:20px;padding:14px;border-radius:10px;font-size:14px;display:none;line-height:1.7}
.loading{background:#1a2a3a;color:#63b3ed;border:1px solid #2d4a6a}
.success{background:#1a3a2a;color:#68d391;border:1px solid #2d6a4f}
.error{background:#3a1a1a;color:#fc8181;border:1px solid #6a2d2d}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #63b3ed;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🚕</div>
  <h1>MK TAXI</h1>
  <div class="sub">اضغط لطلب تاكسي | Appuyez pour appeler un taxi</div>
  <button class="btn" id="btn" onclick="sendLocation()">
    <div>📍 اطلب تاكسي | Appeler un taxi</div>
  </button>
  <div class="status" id="status"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const phone = params.get('phone') || '';

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
  el.style.display = 'block';
}

async function sendLocation() {
  const btn = document.getElementById('btn');
  if (!phone) { showStatus('error', '❌ رابط غير صالح | Lien invalide'); return; }
  if (!navigator.geolocation) { showStatus('error', '❌ GPS غير متاح | GPS non disponible'); return; }
  btn.disabled = true;
  showStatus('loading', '<span class="spinner"></span> جاري تحديد موقعك... | Localisation...');

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      showStatus('loading', '<span class="spinner"></span> جاري البحث... | Recherche chauffeur...');
      try {
        const res = await fetch('/api/locate', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ phone, lat, lng })
        });
        const data = await res.json();
        if (data.ok) {
          showStatus('success',
            `✅ <strong>تم طلب التاكسي ! | Taxi appelé !</strong><br><br>` +
            `ستصلك رسالة واتساب عند قبول السائق 📱<br>` +
            `Vous recevrez un message WhatsApp dès qu'un chauffeur accepte.`
          );
          btn.innerHTML = '<div>✓ تم الطلب | Demande envoyée</div>';
          btn.style.background = 'linear-gradient(135deg,#1a3a2a,#0f2a1a)';
        } else throw new Error(data.error);
      } catch(e) {
        showStatus('error', '❌ خطأ | Erreur. Réessayez.');
        btn.disabled = false;
        btn.innerHTML = '<div>📍 اطلب تاكسي | Appeler un taxi</div>';
      }
    },
    (err) => {
      let msg = '❌ يرجى السماح بالوصول للموقع | Autorisez la localisation.';
      showStatus('error', msg);
      btn.disabled = false;
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}
</script>
</body>
</html>
