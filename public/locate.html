<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MK TAXI</title>
<meta name="theme-color" content="#f6c90e">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     min-height:100vh;display:flex;flex-direction:column;align-items:center;
     justify-content:center;padding:24px;text-align:center}
.logo{font-size:52px;margin-bottom:8px}
.brand{font-size:22px;font-weight:700;color:#0d1117;margin-bottom:4px}
.tagline{font-size:13px;color:#718096;margin-bottom:32px}
.box{width:100%;max-width:360px;border-radius:16px;padding:20px;margin-bottom:16px;transition:all .3s}
.box.idle    {background:#f8fafc;border:1px solid #e2e8f0}
.box.loading {background:#eff6ff;border:1px solid #bfdbfe}
.box.ok      {background:#f0fdf4;border:1px solid #bbf7d0}
.box.error   {background:#fff1f2;border:1px solid #fecdd3}
.box-icon{font-size:28px;margin-bottom:6px}
.box-text{font-size:15px;font-weight:600;color:#0d1117}
.box-sub {font-size:12px;color:#718096;margin-top:4px}
.bar-wrap{width:100%;max-width:360px;height:4px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-bottom:20px}
.bar{height:100%;background:#f6c90e;border-radius:4px;transition:width .5s;width:0}
.cancel{background:transparent;border:1px solid #e2e8f0;border-radius:12px;
        padding:10px 28px;font-size:13px;color:#718096;cursor:pointer;display:none}
</style>
</head>
<body>
<div class="logo">🚕</div>
<div class="brand">MK TAXI</div>
<div class="tagline">نقلك في دقيقة · Votre taxi en 1 minute</div>

<div class="box idle" id="box">
  <div class="box-icon" id="icon">📍</div>
  <div class="box-text" id="txt">تحديد موقعك | Localisation...</div>
  <div class="box-sub"  id="sub">يرجى الانتظار | Veuillez patienter</div>
</div>
<div class="bar-wrap"><div class="bar" id="bar"></div></div>
<button class="cancel" id="cancel-btn" onclick="doCancel()">❌ إلغاء | Annuler</button>

<script>
const BASE = 'https://mlk-transport-production.up.railway.app';
const params = new URLSearchParams(location.search);
const token  = params.get('t') || '';
let phone    = '';
let watchId  = null;
let keepAlive= null;
let submitted= false;

function ui(cls, icon, txt, sub) {
  document.getElementById('box').className = 'box ' + cls;
  document.getElementById('icon').textContent = icon;
  document.getElementById('txt').textContent  = txt;
  document.getElementById('sub').textContent  = sub || '';
}
function bar(p) { document.getElementById('bar').style.width = p + '%'; }
function showCancel() { document.getElementById('cancel-btn').style.display = 'inline-block'; }

async function init() {
  // Vérifier token
  if (!token) {
    ui('error','⚠️','Lien invalide | رابط غير صالح','Demandez un nouveau lien via WhatsApp');
    return;
  }
  try {
    const r = await fetch(`${BASE}/api/client-by-token/${token}`);
    if (!r.ok) throw new Error('Token invalide');
    const data = await r.json();
    phone = data.phone;
  } catch(e) {
    ui('error','🔒','Lien expiré | رابط منتهي الصلاحية','Envoyez un message à MK TAXI pour un nouveau lien');
    return;
  }

  // Demander GPS
  if (!navigator.geolocation) {
    ui('error','⚠️','GPS non disponible','Activez la localisation sur votre appareil');
    return;
  }
  bar(20);
  ui('loading','📡','تحديد موقعك | Localisation en cours...','الرجاء السماح بالوصول | Autorisez la localisation');

  navigator.geolocation.getCurrentPosition(onGPS, onGPSErr,
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
  );
}

async function onGPS(pos) {
  const { latitude: lat, longitude: lng } = pos.coords;
  bar(60);
  ui('loading','🔍','جاري البحث عن سائق | Recherche d\'un chauffeur...','Un instant...');
  showCancel();

  try {
    const r = await fetch(`${BASE}/api/locate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, lat, lng })
    });
    const d = await r.json();
    if (r.ok && d.ok !== false) {
      submitted = true;
      bar(100);
      ui('ok','✅','طلبك قيد المعالجة !','ستتلقى رسالة واتساب قريباً\nVous recevrez un message WhatsApp');
      startTracking(lat, lng);
    } else {
      ui('error','⚠️', d.error || 'Erreur','Réessayez');
    }
  } catch(e) {
    ui('error','⚠️','خطأ في الاتصال | Erreur réseau','Vérifiez votre connexion et réessayez');
  }
}

function startTracking(initLat, initLng) {
  watchId = navigator.geolocation.watchPosition(
    p => updatePos(p.coords.latitude, p.coords.longitude), () => {},
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
  keepAlive = setInterval(() => {
    navigator.geolocation.getCurrentPosition(
      p => updatePos(p.coords.latitude, p.coords.longitude), () => {},
      { enableHighAccuracy: true, maximumAge: 15000 }
    );
  }, 30000);
}

async function updatePos(lat, lng) {
  if (!submitted) return;
  try {
    await fetch(`${BASE}/api/locate/update`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, lat, lng })
    });
  } catch(e) {}
}

function onGPSErr(err) {
  const msgs = {
    1: 'يرجى السماح بالوصول للموقع | Autorisez la localisation dans les paramètres',
    2: 'GPS غير متاح | Signal GPS indisponible',
    3: 'انتهت مهلة GPS | GPS timeout — réessayez'
  };
  ui('error','⚠️','لا يمكن تحديد موقعك | Localisation impossible', msgs[err.code] || 'Réessayez');
}

async function doCancel() {
  stopTracking();
  try {
    await fetch(`${BASE}/api/locate/cancel`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
  } catch(e) {}
  ui('idle','📍','تم الإلغاء | Annulé','');
  bar(0);
  submitted = false;
  document.getElementById('cancel-btn').style.display = 'none';
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (keepAlive) { clearInterval(keepAlive); keepAlive = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && submitted) {
    navigator.geolocation.getCurrentPosition(
      p => updatePos(p.coords.latitude, p.coords.longitude), () => {},
      { enableHighAccuracy: true, maximumAge: 0 }
    );
  }
});

init();
</script>
</body>
</html>
