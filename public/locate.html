<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MLK Transport</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: #1a1f2e;
  border-radius: 20px;
  padding: 32px 24px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  border: 1px solid #2d3748;
}
.logo { font-size: 60px; margin-bottom: 12px; }
h1 { color: #f6c90e; font-size: 24px; margin-bottom: 6px; font-weight: 800; }
.subtitle { color: #718096; font-size: 13px; margin-bottom: 8px; }
.subtitle-ar { color: #a0aec0; font-size: 14px; margin-bottom: 28px; direction: rtl; }

.btn {
  width: 100%;
  background: linear-gradient(135deg, #2d6a4f, #1b4332);
  border: 2px solid #48bb78;
  border-radius: 14px;
  padding: 22px;
  color: #68d391;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity .2s;
  outline: none;
  flex-direction: column;
}
.btn-ar { font-size: 16px; color: #b7e4c7; margin-top: 4px; }
.btn:active { opacity: 0.8; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.status {
  margin-top: 20px;
  padding: 14px;
  border-radius: 10px;
  font-size: 14px;
  display: none;
  line-height: 1.6;
}
.status.loading { background: #1a2a3a; color: #63b3ed; border: 1px solid #2d4a6a; }
.status.success { background: #1a3a2a; color: #68d391; border: 1px solid #2d6a4f; }
.status.error   { background: #3a1a1a; color: #fc8181; border: 1px solid #6a2d2d; }

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid #63b3ed; border-top-color: transparent;
  border-radius: 50%; animation: spin .8s linear infinite;
  margin-left: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🚖</div>
  <h1>MLK Transport</h1>
  <div class="subtitle">Appuyez pour appeler le chauffeur</div>
  <div class="subtitle-ar">اضغط لطلب سيارة</div>

  <button class="btn" id="btn" onclick="sendLocation()">
    <div>📍 Appeler le chauffeur</div>
    <div class="btn-ar">طلب سيارة</div>
  </button>

  <div class="status" id="status"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const phone = params.get('phone') || '';

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
  el.style.display = 'block';
}

async function sendLocation() {
  const btn = document.getElementById('btn');

  if (!phone) {
    showStatus('error', '❌ Lien invalide | رابط غير صالح');
    return;
  }
  if (!navigator.geolocation) {
    showStatus('error', '❌ GPS غير متاح | GPS non disponible');
    return;
  }

  btn.disabled = true;
  showStatus('loading', '<span class="spinner"></span> جاري تحديد موقعك... | Localisation en cours...');

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      showStatus('loading', '<span class="spinner"></span> جاري البحث عن سائق... | Recherche chauffeur...');
      try {
        const res = await fetch('/api/locate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, lat, lng })
        });
        const data = await res.json();
        if (data.ok) {
          showStatus('success',
            `✅ <strong>تم طلب السيارة ! | Chauffeur appelé !</strong><br><br>` +
            `ستصلك رسالة WhatsApp عند قبول السائق.<br>` +
            `سيتم إعلامك عبر WhatsApp.`
          );
          btn.innerHTML = '<div>✓ تم الطلب | Demande envoyée</div>';
        } else throw new Error(data.error);
      } catch (e) {
        showStatus('error', '❌ خطأ | Erreur. Réessayez.');
        btn.disabled = false;
        btn.innerHTML = '<div>📍 Appeler le chauffeur</div><div class="btn-ar">طلب سيارة</div>';
      }
    },
    (err) => {
      let msg = '❌ GPS refusé | تم رفض الموقع.<br>Autorisez la localisation | اسمح بالوصول للموقع.';
      showStatus('error', msg);
      btn.disabled = false;
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}
</script>
</body>
</html>
