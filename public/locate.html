<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MK TAXI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚕</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.logo{font-size:64px;margin-bottom:8px;text-align:center}
.brand{font-size:28px;font-weight:800;color:#f6c90e;text-align:center;margin-bottom:4px}
.tagline{font-size:14px;color:#718096;text-align:center;margin-bottom:40px}
.btn-main{width:100%;max-width:340px;background:#25d366;border:none;border-radius:24px;padding:28px 20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .15s,opacity .15s;-webkit-tap-highlight-color:transparent}
.btn-main:active{transform:scale(0.97);opacity:.9}
.btn-icon{font-size:52px}
.btn-ar{font-size:22px;font-weight:800;color:#fff}
.btn-fr{font-size:15px;color:rgba(255,255,255,0.85)}
.status{margin-top:24px;padding:14px 20px;border-radius:16px;font-size:14px;text-align:center;display:none;max-width:340px;width:100%;line-height:1.7}
.status.loading{background:#1a2a3a;color:#63b3ed;border:1px solid #2d4a6a;display:block}
.status.success{background:#1a3a2a;color:#68d391;border:1px solid #2d6a4f;display:block}
.status.error{background:#3a1a1a;color:#fc8181;border:1px solid #6a2d2d;display:block}
.status.searching{background:#3a300a;color:#f6c90e;border:1px solid #744210;display:block}
.cancel-btn{margin-top:14px;background:none;border:1px solid #4a5568;color:#718096;border-radius:12px;padding:10px 24px;font-size:14px;cursor:pointer;display:none}
.cancel-btn.show{display:block}
audio{display:none}
</style>
</head>
<body>

<div class="logo">🚕</div>
<div class="brand">MK TAXI</div>
<div class="tagline">نقلك في دقيقة | Votre taxi en 1 minute</div>

<button class="btn-main" id="mainBtn" onclick="requestTaxi()" style="display:none">
  <div class="btn-icon">📍</div>
  <div class="btn-ar">اضغط لطلب تاكسي</div>
  <div class="btn-fr">Appuyez pour commander un taxi</div>
</button>

<div class="status" id="status"></div>
<button class="cancel-btn" id="cancelBtn" onclick="cancelRide()">❌ إلغاء | Annuler</button>


<style>
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>

<script>
const phone = new URLSearchParams(location.search).get('phone') || '';

// Lancer automatiquement la demande de localisation
window.addEventListener('load', () => setTimeout(requestTaxi, 500));
let rideRequested = false;


function playVoice() {
  const a = document.getElementById('voiceMsg');
  if (a) a.play().catch(()=>{});
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
}

async function requestTaxi() {
  if (rideRequested) return;

  if (!navigator.geolocation) {
    setStatus('❌ GPS غير متاح على هذا الجهاز<br>GPS non disponible', 'error');
    return;
  }

  document.getElementById('mainBtn').disabled = true;
  setStatus('📡 جاري تحديد موقعك...<br>Localisation en cours...', 'loading');

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      setStatus('🔍 جاري البحث عن سائق...<br>Recherche d\'un chauffeur...', 'searching');
      document.getElementById('cancelBtn').classList.add('show');

      try {
        const res = await fetch('/api/locate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, lat, lng })
        });
        const data = await res.json();
        if (data.ok) {
          rideRequested = true;
          setStatus('✅ طلبك قيد المعالجة !<br>Votre demande est en cours !<br><small style="color:#a0aec0">ستتلقى رسالة واتساب قريباً<br>Vous recevrez un message WhatsApp</small>', 'success');
          startPolling();
        } else {
          setStatus('❌ خطأ | Erreur. Réessayez.', 'error');
          document.getElementById('mainBtn').disabled = false;
        }
      } catch(e) {
        setStatus('❌ خطأ في الاتصال | Erreur réseau', 'error');
        document.getElementById('mainBtn').disabled = false;
      }
    },
    (err) => {
      document.getElementById('mainBtn').disabled = false;
      setStatus('⚠️ اسمح بالوصول للموقع من إعدادات المتصفح<br>Autorisez la localisation dans les paramètres', 'error');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function startPolling() {
  let tries = 0;
  const interval = setInterval(async () => {
    tries++;
    if (tries > 24) { clearInterval(interval); return; }
    try {
      const res = await fetch(`/api/ride/status?phone=${phone}`);
      const data = await res.json();
      if (data.status === 'assigned') {
        clearInterval(interval);
        setStatus(
          `🚕 <strong>تم قبول طلبك !</strong><br>Chauffeur trouvé !<br>` +
          `<small style="color:#a0aec0">تحقق من واتساب للتفاصيل<br>Vérifiez WhatsApp pour les détails</small>`,
          'success'
        );
        document.getElementById('cancelBtn').classList.remove('show');
      }
    } catch(e) {}
  }, 5000);
}

async function cancelRide() {
  if (typeof locWatchId !== 'undefined' && locWatchId !== null) {
    navigator.geolocation.clearWatch(locWatchId);
    locWatchId = null;
  }
  await fetch('/api/locate/cancel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone })
  });
  setStatus('❌ تم الإلغاء | Annulé', 'error');
  document.getElementById('cancelBtn').classList.remove('show');
  document.getElementById('mainBtn').disabled = false;
  rideRequested = false;
}
</script>
</body>
</html>
