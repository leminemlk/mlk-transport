<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MLK Transport — Position</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  background: #1a1f2e;
  border-radius: 20px;
  padding: 32px 24px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  border: 1px solid #2d3748;
}

.logo { font-size: 60px; margin-bottom: 16px; }
h1 { color: #f6c90e; font-size: 22px; margin-bottom: 8px; }
p { color: #718096; font-size: 14px; margin-bottom: 32px; line-height: 1.5; }

.btn {
  width: 100%;
  background: linear-gradient(135deg, #2d6a4f, #1b4332);
  border: 2px solid #48bb78;
  border-radius: 14px;
  padding: 20px;
  color: #68d391;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity .2s;
  outline: none;
}
.btn:active { opacity: 0.8; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.status {
  margin-top: 24px;
  padding: 14px;
  border-radius: 10px;
  font-size: 14px;
  display: none;
}
.status.loading { background: #1a2a3a; color: #63b3ed; border: 1px solid #2d4a6a; }
.status.success { background: #1a3a2a; color: #68d391; border: 1px solid #2d6a4f; }
.status.error   { background: #3a1a1a; color: #fc8181; border: 1px solid #6a2d2d; }

.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid #63b3ed;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">🚖</div>
  <h1>MLK Transport</h1>
  <p>Appuyez sur le bouton pour envoyer votre position et appeler une voiture.</p>

  <button class="btn" id="btn" onclick="sendLocation()">
    <span>📍</span>
    <span id="btn-text">Appeler une voiture</span>
  </button>

  <div class="status" id="status"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const phone = params.get('phone') || '';

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
  el.style.display = 'block';
}

async function sendLocation() {
  const btn = document.getElementById('btn');
  const btnText = document.getElementById('btn-text');

  if (!phone) {
    showStatus('error', '❌ Lien invalide. Envoyez un message au bot WhatsApp.');
    return;
  }

  if (!navigator.geolocation) {
    showStatus('error', '❌ GPS non disponible sur votre appareil.');
    return;
  }

  btn.disabled = true;
  btnText.textContent = 'Localisation...';
  showStatus('loading', '<span class="spinner"></span>Récupération de votre position...');

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      showStatus('loading', '<span class="spinner"></span>Recherche d\'un chauffeur...');

      try {
        const res = await fetch('/api/locate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, lat, lng })
        });
        const data = await res.json();

        if (data.ok) {
          showStatus('success',
            '✅ <strong>Voiture appelée !</strong><br><br>' +
            'Vous recevrez une notification WhatsApp dès qu\'un chauffeur accepte.<br><br>' +
            '📱 Gardez WhatsApp ouvert.'
          );
          btnText.textContent = 'Demande envoyée ✓';
        } else {
          throw new Error(data.error || 'Erreur serveur');
        }
      } catch (e) {
        showStatus('error', '❌ Erreur : ' + e.message + '<br>Réessayez.');
        btn.disabled = false;
        btnText.textContent = 'Appeler une voiture';
      }
    },
    (err) => {
      let msg = '❌ Impossible d\'accéder au GPS.';
      if (err.code === 1) msg = '❌ Accès GPS refusé.<br>Autorisez la localisation dans les paramètres.';
      if (err.code === 2) msg = '❌ Position introuvable. Vérifiez votre GPS.';
      if (err.code === 3) msg = '❌ Délai GPS dépassé. Réessayez.';
      showStatus('error', msg);
      btn.disabled = false;
      btnText.textContent = 'Appeler une voiture';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}
</script>
</body>
</html>
